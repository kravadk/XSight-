services:
  - type: web
    name: xsight-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: "*"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OKX_API_KEY
        sync: false
      - key: OKX_SECRET_KEY
        sync: false
      - key: OKX_PASSPHRASE
        sync: false
      - key: OKX_PROJECT_ID
        sync: false
      - key: DEPLOYER_PRIVATE_KEY
        sync: false
      - key: AGENTIC_WALLET_ADDRESS
        sync: false
      - key: X402_PAYOUT_ADDRESS
        sync: false
      - key: BLOCKAID_API_KEY
        sync: false
      - key: X_LAYER_RPC_URL
        value: https://rpc.xlayer.tech
      - key: X402_NETWORK
        value: xlayer-mainnet
      - key: X402_ASSET
        value: USDT
      - key: ALLOW_DEV_BYPASS
        value: true
